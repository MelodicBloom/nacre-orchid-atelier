name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Type Check ──────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  # ── 2. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  # ── 3. Unit Tests ──────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  # ── 4. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist
          retention-days: 7

  # ── 5. Type Export Validation (attw) ───────────────────────────────────────
  attw:
    name: Are The Types Wrong
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npx attw --pack packages/tokens
        continue-on-error: false

  # ── 6. Profile Schema Validation ───────────────────────────────────────────
  validate-profile:
    name: Validate Inquiry Profile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Validate example profile against schema
        run: |
          node -e "
            import('./packages/tokens/src/pipeline/validate-profile.js').then(({ validateProfile }) => {
              const fs = await import('fs');
              // Validates the committed example profile from nacre-inquiry-engine
              const profile = JSON.parse(fs.readFileSync('packages/tokens/fixtures/example-profile.json', 'utf-8'));
              const result = validateProfile(profile);
              if (!result.valid) {
                console.error('Profile validation failed:', result.errors);
                process.exit(1);
              }
              console.log('Profile valid.');
            });
          "

  # ── 7. Gate Status Check ───────────────────────────────────────────────────
  gate-check:
    name: Gate 1 Readiness
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test, build]
    steps:
      - uses: actions/checkout@v4
      - name: Verify GATES.md exists and Gate 1 items are tracked
        run: |
          if [ ! -f GATES.md ]; then
            echo "GATES.md missing — cannot verify gate status"
            exit 1
          fi
          echo "GATES.md present. Gate status tracked."
          grep -c "\- \[" GATES.md && echo "Gate checklist items found."
