name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label-gate:
    name: Block gate-blocker PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for gate-blocker label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (labels.includes('gate-blocker')) {
              core.setFailed('This PR is labeled gate-blocker and cannot be merged until the blocker is resolved.');
            }

  size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Count changed files
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          echo "Files changed: $CHANGED"
          if [ $CHANGED -gt 50 ]; then
            echo "::warning::This PR changes $CHANGED files. Consider breaking it into smaller PRs."
          fi

  spec-drift:
    name: Spec Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Warn if SPEC.md was not updated alongside major changes
        run: |
          SPEC_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -c "SPEC.md" || true)
          SRC_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -c "packages/" || true)
          if [ $SRC_CHANGED -gt 10 ] && [ $SPEC_CHANGED -eq 0 ]; then
            echo "::warning::$SRC_CHANGED package files changed but SPEC.md was not updated. Consider updating the spec if architecture changed."
          fi
